worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Rate limiting: per IP ──
    limit_req_zone $binary_remote_addr zone=stream:10m rate=10r/s;
    limit_req_status 429;

    # ── Referer check: only upfusion.net ──
    map $http_referer $deny_referer {
        default           1;
        "~*upfusion\.net" 0;
    }

    # ── Slug to filename mapping ──
    map $slug $track_file {
        # UPFUSION - Mix
        orthopraxy "01-Orthopraxy.mp3";
        genome     "02-Genome.mp3";
        extinction "03-Extinction.mp3";
        axiom      "04-Axiom.mp3";
        noir       "05-Noir.mp3";
        default   "";
    }

    map $slug $waveform_file {
        # UPFUSION - Mix
        orthopraxy "01-Orthopraxy.svg";
        genome     "02-Genome.svg";
        extinction "03-Extinction.svg";
        axiom      "04-Axiom.svg";
        noir       "05-Noir.svg";
        default   "";
    }

    server {
        listen 8080;
        server_name _;

        autoindex off;

        # ── Health check ──
        location = /health {
            access_log off;
            return 200 'ok\n';
        }

        # ── Stream audio ──
        # URL: /stream/upfusion/mix/axiom
        # Maps to: /music/upfusion/mix/04-Axiom.mp3
        location ~ ^/stream/([a-z0-9-]+)/([a-z0-9-]+)/([a-z]+)$ {
            set $band $1;
            set $album $2;
            set $slug $3;

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://upfusion.net";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Allow-Headers "Range";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            # Anti-hotlinking - reject if not from upfusion.net
            if ($deny_referer) {
                return 403;
            }

            # Unknown track
            if ($track_file = "") {
                return 404;
            }

            # Rate limit per IP
            limit_req zone=stream burst=15 nodelay;

            # Serve from music/band/album directory
            alias /music/$band/$album/$track_file;

            # Force audio content type - prevent MIME sniffing
            types { }
            default_type audio/mpeg;

            # Headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Disposition "inline" always;
            add_header Cache-Control "private, no-cache" always;

            # CORS - restricted to upfusion.net only
            add_header Access-Control-Allow-Origin "https://upfusion.net" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        # ── Waveform images ──
        # URL: /waveform/upfusion/mix/axiom
        # Maps to: /music/upfusion/mix/waveforms/04-Axiom.svg
        location ~ ^/waveform/([a-z0-9-]+)/([a-z0-9-]+)/([a-z]+)$ {
            set $band $1;
            set $album $2;
            set $slug $3;

            # Anti-hotlinking
            if ($deny_referer) {
                return 403;
            }

            # Unknown track
            if ($waveform_file = "") {
                return 404;
            }

            alias /music/$band/$album/waveforms/$waveform_file;

            types { }
            default_type image/svg+xml;

            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Access-Control-Allow-Origin "https://upfusion.net" always;
        }

        # ── Block everything else ──
        location / {
            return 404;
        }
    }
}
