worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Rate limiting: 30 req/min per IP ──
    limit_req_zone $binary_remote_addr zone=stream:10m rate=30r/m;
    limit_req_status 429;

    # ── Referer check: only upfusion.net ──
    map $http_referer $deny_referer {
        default           1;
        "~*upfusion\.net" 0;
    }

    # ── Slug to filename mapping ──
    map $slug $track_file {
        destiny   "01-Destiny.mp3";
        brenda    "02-Brenda.mp3";
        melanie   "03-Melanie.mp3";
        smile     "04-Smile.mp3";
        margot    "05-Margot.mp3";
        candy     "06-Candy.mp3";
        sable     "07-Sable.mp3";
        electra   "08-Electra.mp3";
        trempest  "09-Trempest.mp3";
        diamond   "10-Diamond.mp3";
        briana    "11-Briana.mp3";
        default   "";
    }

    server {
        listen 8080;
        server_name _;

        autoindex off;

        # ── Health check ──
        location = /health {
            access_log off;
            return 200 'ok\n';
        }

        # ── Stream audio ──
        # URL: /stream/deftones/eros/destiny
        # Maps to: /music/deftones/eros/01-Destiny.mp3
        location ~ ^/stream/([a-z0-9-]+)/([a-z0-9-]+)/([a-z]+)$ {
            set $band $1;
            set $album $2;
            set $slug $3;

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://upfusion.net";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Allow-Headers "Range";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            # Anti-hotlinking - reject if not from upfusion.net
            if ($deny_referer) {
                return 403;
            }

            # Unknown track
            if ($track_file = "") {
                return 404;
            }

            # Rate limit per IP
            limit_req zone=stream burst=15 nodelay;

            # Serve from music/band/album directory
            alias /music/$band/$album/$track_file;

            # Force audio content type - prevent MIME sniffing
            types { }
            default_type audio/mpeg;

            # Anti-download headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Disposition "inline" always;
            add_header Cache-Control "no-store" always;

            # CORS - restricted to upfusion.net only
            add_header Access-Control-Allow-Origin "https://upfusion.net" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        # ── Block everything else ──
        location / {
            return 404;
        }
    }
}
