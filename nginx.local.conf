worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Rate limiting: 30 req/min per IP ──
    limit_req_zone $binary_remote_addr zone=stream:10m rate=30r/m;
    limit_req_status 429;

    # ── Referer check: only upfusion.net ──
    map $http_referer $deny_referer {
        default           1;
        "~*upfusion\.net" 0;
        "~*localhost"     0;
    }

    # ── Slug to filename mapping (keyed by album/slug to avoid collisions) ──
    map $album_slug $track_file {
        # UPFUSION - Alternative
        "alternative/orthopraxy" "01-Orthopraxy.mp3";
        "alternative/genome"     "02-Genome.mp3";
        "alternative/extinction" "03-Extinction.mp3";
        "alternative/axiom"      "04-Axiom.mp3";
        "alternative/noir"       "05-Noir.mp3";
        # UPFUSION - Jazz
        "jazz/spring-vibes"      "01-Spring-Vibes.mp3";
        "jazz/d-flat-jazz"       "02-D-Flat-Jazz.mp3";
        "jazz/cronus-fall"       "03-Cronus-Fall.mp3";
        "jazz/hypnos-prelude"    "04-Hypnos-Prelude.mp3";
        "jazz/poseidon-ocean"    "05-Poseidon-Ocean.mp3";
        "jazz/axiom"             "06-Axiom.mp3";
        "jazz/noir"              "07-Noir.mp3";
        "jazz/sigma"             "08-Sigma.mp3";
        default "";
    }

    server {
        listen 8080;
        server_name _;

        autoindex off;

        # ── Health check ──
        location = /health {
            access_log off;
            return 200 'ok\n';
        }

        # ── Stream audio ──
        # URL: /stream/upfusion/alternative/axiom
        # Maps to: /music/upfusion/alternative/04-Axiom.mp3
        location ~ ^/stream/([a-z0-9-]+)/([a-z0-9-]+)/([a-z0-9-]+)$ {
            set $band $1;
            set $album $2;
            set $slug $3;
            set $album_slug "$album/$slug";

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://upfusion.net";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Allow-Headers "Range";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            # Anti-hotlinking - reject if not from upfusion.net
            if ($deny_referer) {
                return 403;
            }

            # Unknown track
            if ($track_file = "") {
                return 404;
            }

            # Rate limit per IP
            limit_req zone=stream burst=15 nodelay;

            # Serve from music/band/album directory
            alias /music/$band/$album/$track_file;

            # Force audio content type - prevent MIME sniffing
            types { }
            default_type audio/mpeg;

            # Anti-download headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Disposition "inline" always;
            add_header Cache-Control "no-store" always;

            # CORS - restricted to upfusion.net only
            add_header Access-Control-Allow-Origin "https://upfusion.net" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        # ── Block everything else ──
        location / {
            return 404;
        }
    }
}
